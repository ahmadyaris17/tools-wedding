<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Generator Undangan WhatsApp</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      margin: 0;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      background: #fff;
      padding: 30px;
      border-radius: 16px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.2);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 22px;
      text-align: center;
      color: #333;
    }

    .desc {
      text-align: center;
      font-size: 13px;
      color: #777;
      margin-bottom: 20px;
    }

    label {
      font-size: 12px;
      color: #555;
      display: block;
      margin-top: 10px;
      margin-bottom: 5px;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
      outline: none;
    }

    .actions {
      margin-top: 15px;
      display: flex;
      gap: 10px;
    }

    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .btn-wa {
      background: #25D366;
      color: white;
    }

    .btn-copy {
      background: #eee;
    }

    .preview {
      margin-top: 15px;
    }

    .box {
      background: #f4f4f4;
      padding: 10px;
      border-radius: 8px;
      font-size: 12px;
      word-break: break-all;
    }

    .note {
      margin-top: 10px;
      font-size: 11px;
      color: #888;
      text-align: center;
    }
  </style>
</head>

<body>

<div class="card">
  <h1>🎉 Generator Undangan</h1>
  <p class="desc">Kirim undangan WhatsApp otomatis</p>

  <label>Link Undangan</label>
  <input id="baseUrl" value="https://yaris-nengrita.my.id/" />

  <label>Nama Tamu</label>
  <input id="toName" placeholder="Contoh: Bangus Team" />

  <div class="actions">
    <button class="btn-wa" onclick="openWhatsApp()">Kirim WA</button>
    <button class="btn-copy" onclick="copyLink()">Copy Link</button>
  </div>

  <div class="preview">
    <p><b>Preview Link:</b></p>
    <div id="previewLink" class="box"></div>
  </div>

  <p class="note">
    Preview gambar akan muncul setelah link dikirim di WhatsApp
  </p>
</div>

<script>
const baseUrl = document.getElementById("baseUrl");
const toName = document.getElementById("toName");
const previewLink = document.getElementById("previewLink");

function buildLink() {
  let url = new URL(baseUrl.value);
  const name = toName.value.trim();

  if (name) {
    url.searchParams.set("to", name);
  }

  return url.toString();
}

function updatePreview() {
  previewLink.innerText = buildLink();
}

function openWhatsApp() {
  const name = toName.value.trim() || "Tamu";
  const link = buildLink();

  const message = `Assalamu'alaikum Wr. Wb
Bismillahirahmanirrahim.

Yth. ${name}

Tanpa mengurangi rasa hormat, perkenankan kami mengundang Bapak/Ibu/Saudara/i, teman sekaligus sahabat, untuk menghadiri acara pernikahan kami :

Ahmad Yaris & Neng Rita Nurdianti

Berikut link undangan kami untuk info lengkap dari acara bisa kunjungi :
${link}

Merupakan suatu kebahagiaan bagi kami apabila Bapak/Ibu/Saudara/i berkenan untuk hadir dan memberikan doa restu.

Mohon maaf perihal undangan hanya di bagikan melalui pesan ini. Terima kasih banyak atas perhatiannya.

Wassalamu'alaikum Wr. Wb.
Terima Kasih.`;

  const wa = `https://wa.me/?text=${encodeURIComponent(message)}`;
  window.open(wa, "_blank");
}

function copyLink() {
  navigator.clipboard.writeText(buildLink());
  alert("Link berhasil di copy");
}

toName.addEventListener("input", updatePreview);
updatePreview();
</script>

</body>
</html>
